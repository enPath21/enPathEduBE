steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/enpath-app/cloud-run-source-deploy/enpath-edu-be:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/enpath-app/cloud-run-source-deploy/enpath-edu-be:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/enpath-app/cloud-run-source-deploy/enpath-edu-be']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - enpath-edu-be
      - --image=us-central1-docker.pkg.dev/enpath-app/cloud-run-source-deploy/enpath-edu-be:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --port=8080
      - --allow-unauthenticated
images:
  - 'us-central1-docker.pkg.dev/enpath-app/cloud-run-source-deploy/enpath-edu-be'
